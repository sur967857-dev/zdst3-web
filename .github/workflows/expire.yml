name: Expirar llaves

on:
  schedule:
    - cron: '0 * * * *'   # cada hora
  workflow_dispatch:

permissions:
  contents: write

jobs:
  expire:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Instalar dependencias
        run: pip install httpx -q

      - name: Expirar llaves y sobreescribir manifests
        env:
          OLLAMA_API_KEY: ${{ secrets.OLLAMA_API_KEY }}
        run: python3 expire_keys.py

      - name: Commit cambios
        run: |
          git config user.name "zdst3-expiry-bot"
          git config user.email "bot@zdst3.noreply"
          git add -A
          git diff --staged --quiet || git commit -m "chore: expirar llaves [skip ci]"
          git push
